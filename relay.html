<!DOCTYPE html>
<html>
<body>
<input type="file" id="fi" style="opacity:0;position:fixed;top:0;left:0;width:100%;height:100%" />
<script>
document.getElementById('fi').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async () => {
    const r = await fetch('http://localhost:9998/ictinus-contractors.png', {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: reader.result
    });
    document.title = 'SAVED:' + await r.text();
  };
  reader.readAsDataURL(file);
});
</script>
</body>
</html>
