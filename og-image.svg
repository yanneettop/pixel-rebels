<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a0a12;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF4D4D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8C00;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="12" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Subtle grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Glow orb top-right -->
  <circle cx="1050" cy="100" r="220" fill="#FF4D4D" fill-opacity="0.08" filter="url(#glow)"/>

  <!-- Glow orb bottom-left -->
  <circle cx="150" cy="530" r="180" fill="#FF4D4D" fill-opacity="0.06" filter="url(#glow)"/>

  <!-- Red accent bar top -->
  <rect x="80" y="80" width="60" height="6" rx="3" fill="url(#accent)"/>

  <!-- Logo mark — pixel grid icon -->
  <g transform="translate(80, 120)">
    <rect x="0"  y="0"  width="18" height="18" rx="3" fill="#FF4D4D"/>
    <rect x="22" y="0"  width="18" height="18" rx="3" fill="#FF4D4D" fill-opacity="0.6"/>
    <rect x="0"  y="22" width="18" height="18" rx="3" fill="#FF4D4D" fill-opacity="0.6"/>
    <rect x="22" y="22" width="18" height="18" rx="3" fill="#FF4D4D" fill-opacity="0.3"/>
  </g>

  <!-- Brand name -->
  <text x="80" y="240" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="72" font-weight="800" fill="#ffffff" letter-spacing="-2">Pixel Rebels</text>

  <!-- Tagline -->
  <text x="82" y="298" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="28" font-weight="400" fill="#9ca3af" letter-spacing="0.5">Creative Digital Agency</text>

  <!-- Divider line -->
  <rect x="80" y="330" width="1040" height="1" fill="#2a2a2a"/>

  <!-- Value prop -->
  <text x="80" y="390" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="24" font-weight="400" fill="#d1d5db">Fast, high-performing websites that drive real business growth.</text>

  <!-- Pills -->
  <g transform="translate(80, 430)">
    <!-- Pill 1 -->
    <rect x="0" y="0" width="190" height="44" rx="22" fill="#FF4D4D" fill-opacity="0.12" stroke="#FF4D4D" stroke-opacity="0.3" stroke-width="1"/>
    <text x="95" y="28" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="16" font-weight="500" fill="#FF4D4D">Web Design</text>
    <!-- Pill 2 -->
    <rect x="206" y="0" width="220" height="44" rx="22" fill="#FF4D4D" fill-opacity="0.12" stroke="#FF4D4D" stroke-opacity="0.3" stroke-width="1"/>
    <text x="316" y="28" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="16" font-weight="500" fill="#FF4D4D">Web Development</text>
    <!-- Pill 3 -->
    <rect x="442" y="0" width="160" height="44" rx="22" fill="#FF4D4D" fill-opacity="0.12" stroke="#FF4D4D" stroke-opacity="0.3" stroke-width="1"/>
    <text x="522" y="28" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="16" font-weight="500" fill="#FF4D4D">Branding</text>
    <!-- Pill 4 -->
    <rect x="618" y="0" width="200" height="44" rx="22" fill="#FF4D4D" fill-opacity="0.12" stroke="#FF4D4D" stroke-opacity="0.3" stroke-width="1"/>
    <text x="718" y="28" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="16" font-weight="500" fill="#FF4D4D">SEO Included</text>
  </g>

  <!-- Domain watermark -->
  <text x="80" y="575" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="18" font-weight="400" fill="#6b7280">pixelrebels.space</text>

  <!-- Star rating bottom right -->
  <g transform="translate(900, 540)">
    <text x="0" y="0" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="20" fill="#FF4D4D">★★★★★</text>
    <text x="110" y="0" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="16" fill="#9ca3af">5.0 · 3 client reviews</text>
  </g>
</svg>
