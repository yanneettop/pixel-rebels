<!DOCTYPE html>
<html lang="en" style="color-scheme: dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <meta name="theme-color" content="#07070F" />
  <meta name="description" content="Sign in to your Pixel Rebels account to access your projects and creative workspace." />
  <title>Sign In — Pixel Rebels</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #07070F;
      --bg-panel:  #0D0D1C;
      --teal:      #00FFD1;
      --pink:      #FF2D78;
      --text:      #EEEEF8;
      --muted:     #5A5A7A;
      --border:    rgba(255,255,255,0.07);
      --field-bg:  rgba(255,255,255,0.04);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    /* ── layout ──────────────────────────────── */
    .shell {
      display: flex;
      height: 100vh;
      width: 100vw;
    }

    /* ── left brand panel ────────────────────── */
    .brand {
      flex: 1;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 56px 64px;
      overflow: hidden;
    }

    /* grid lines */
    .brand::before {
      content: '';
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 44px 44px;
      pointer-events: none;
    }

    /* ambient glow */
    .brand::after {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 55% 45% at 25% 15%, rgba(0,255,209,.10) 0%, transparent 70%),
        radial-gradient(ellipse 40% 35% at 70% 80%, rgba(255,45,120,.07) 0%, transparent 60%);
      pointer-events: none;
    }

    /* floating pixel particles */
    .px { position: absolute; border-radius: 2px; opacity: 0; animation: rise var(--d,5s) ease-in-out var(--delay,0s) infinite; }
    @keyframes rise {
      0%   { opacity:0; transform: translateY(0) scale(1); }
      15%  { opacity: var(--op,.5); }
      85%  { opacity: var(--op,.5); }
      100% { opacity:0; transform: translateY(-130px) scale(.2); }
    }

    .brand-content {
      position: relative;
      z-index: 2;
    }

    .wordmark {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 52px;
    }

    .px-logo {
      display: grid;
      grid-template-columns: repeat(4,1fr);
      grid-template-rows: repeat(4,1fr);
      gap: 3px;
      width: 38px;
      height: 38px;
    }

    .px-logo div {
      border-radius: 1px;
      background: var(--teal);
      animation: blink 4s ease-in-out infinite;
    }

    .px-logo div:nth-child(2)  { animation-delay:.3s;  opacity:.15; }
    .px-logo div:nth-child(4)  { animation-delay:.6s;  opacity:.15; }
    .px-logo div:nth-child(5)  { animation-delay:.9s;  opacity:.15; }
    .px-logo div:nth-child(7)  { animation-delay:1.2s; opacity:.15; }
    .px-logo div:nth-child(10) { animation-delay:.4s;  opacity:.15; }
    .px-logo div:nth-child(12) { animation-delay:.8s;  opacity:.15; }
    .px-logo div:nth-child(13) { animation-delay:.2s;  opacity:.5; }
    .px-logo div:nth-child(15) { animation-delay:.5s;  opacity:.5; }

    @keyframes blink {
      0%,100% { opacity: inherit; }
      50%      { opacity: 1; }
    }

    .wordmark-name {
      font-size: 17px;
      font-weight: 800;
      letter-spacing: -.3px;
    }

    .wordmark-name em {
      color: var(--teal);
      font-style: normal;
    }

    .headline {
      font-size: clamp(52px, 6.5vw, 88px);
      font-weight: 900;
      line-height: .95;
      letter-spacing: -4px;
      margin-bottom: 28px;
    }

    .headline .solid { display: block; color: var(--text); }
    .headline .outline {
      display: block;
      color: transparent;
      -webkit-text-stroke: 1.5px var(--teal);
      position: relative;
    }

    /* glitch on outline word */
    .headline .outline::before,
    .headline .outline::after {
      content: attr(data-text);
      position: absolute;
      top: 0; left: 0;
      color: transparent;
      -webkit-text-stroke: 1.5px var(--pink);
      clip-path: inset(0 0 60% 0);
      opacity: 0;
    }

    .headline .outline::after {
      -webkit-text-stroke: 1.5px var(--teal);
      clip-path: inset(60% 0 0 0);
    }

    @keyframes glitch-a {
      0%,89%,100% { opacity:0; transform: none; }
      90%          { opacity:1; transform: translateX(-5px) skewX(-3deg); }
      92%          { opacity:1; transform: translateX(3px) skewX(2deg); }
      94%          { opacity:0; }
    }

    @keyframes glitch-b {
      0%,90%,100% { opacity:0; transform: none; }
      91%          { opacity:1; transform: translateX(4px); }
      93%          { opacity:1; transform: translateX(-4px); }
      95%          { opacity:0; }
    }

    .headline .outline::before { animation: glitch-a 7s linear infinite; }
    .headline .outline::after  { animation: glitch-b 7s linear infinite; }

    .tagline {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.65;
      max-width: 320px;
    }

    /* dots in top-right of brand panel */
    .dots {
      position: absolute;
      top: 48px; right: 56px;
      display: flex; gap: 8px;
      z-index: 2;
    }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
    }

    .dot-r { background: var(--pink); }
    .dot-y { background: #FFB800; }
    .dot-g { background: var(--teal); }

    /* ── slim divider ────────────────────────── */
    .rail {
      width: 1px;
      flex-shrink: 0;
      background: linear-gradient(180deg, transparent 0%, var(--teal) 35%, var(--teal) 65%, transparent 100%);
      position: relative;
    }

    .rail-gem {
      position: absolute;
      left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      width: 5px; height: 64px;
      background: var(--teal);
      border-radius: 3px;
      box-shadow: 0 0 22px 4px rgba(0,255,209,.5);
      animation: gemPulse 2.4s ease-in-out infinite;
    }

    @keyframes gemPulse {
      0%,100% { height:64px; opacity:1; }
      50%      { height:88px; opacity:.55; }
    }

    /* ── right form panel ────────────────────── */
    .form-panel {
      width: clamp(360px, 38%, 480px);
      flex-shrink: 0;
      background: var(--bg-panel);
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 56px 52px;
      overflow: hidden;
    }

    /* top accent line */
    .form-panel::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--teal) 40%, var(--pink) 70%, transparent);
    }

    /* subtle panel glow */
    .form-panel::after {
      content: '';
      position: absolute;
      top: -60px; right: -60px;
      width: 250px; height: 250px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,255,209,.05) 0%, transparent 70%);
      pointer-events: none;
    }

    .form-inner { position: relative; z-index: 1; }

    .eyebrow {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--teal);
      margin-bottom: 10px;
    }

    .form-title {
      font-size: 30px;
      font-weight: 800;
      letter-spacing: -1px;
      margin-bottom: 36px;
      line-height: 1.1;
    }

    /* fields */
    .field { margin-bottom: 18px; }

    .field label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .field-wrap {
      position: relative;
    }

    .field-wrap svg {
      position: absolute;
      left: 15px; top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      color: var(--muted);
      transition: color .2s;
    }

    .field-wrap input {
      width: 100%;
      padding: 13px 16px 13px 42px;
      background: var(--field-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      -webkit-appearance: none;
    }

    .field-wrap input:focus-visible {
      border-color: rgba(0,255,209,.55);
      box-shadow: 0 0 0 3px rgba(0,255,209,.15);
    }

    .field-wrap input::placeholder { color: var(--muted); }

    .field-wrap input:focus {
      border-color: rgba(0,255,209,.55);
      box-shadow: 0 0 0 3px rgba(0,255,209,.08);
    }

    .field-wrap input:focus ~ svg { color: var(--teal); }

    /* password toggle */
    .eye-btn {
      position: absolute;
      right: 14px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      cursor: pointer;
      color: var(--muted);
      padding: 2px;
      line-height: 0;
      transition: color .2s;
    }

    .eye-btn:hover { color: var(--text); }
    .eye-btn:focus-visible { outline: 2px solid var(--teal); outline-offset: 2px; border-radius: 4px; }

    .field-wrap input[type="password"],
    .field-wrap input.has-eye {
      padding-right: 42px;
    }

    /* row: remember + forgot */
    .aux-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }

    .check-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
    }

    .check-wrap input[type="checkbox"] {
      appearance: none;
      width: 15px; height: 15px;
      border: 1.5px solid var(--border);
      border-radius: 4px;
      background: transparent;
      cursor: pointer;
      position: relative;
      flex-shrink: 0;
      transition: background .15s, border-color .15s;
    }

    .check-wrap input[type="checkbox"]:checked {
      background: var(--teal);
      border-color: var(--teal);
    }

    .check-wrap input[type="checkbox"]:checked::after {
      content: '';
      position: absolute;
      top: 1px; left: 4px;
      width: 4px; height: 7px;
      border: 2px solid #000;
      border-top: none; border-left: none;
      transform: rotate(45deg);
    }

    .check-label { font-size: 13px; color: var(--muted); }

    .forgot {
      font-size: 12px;
      font-weight: 600;
      color: var(--teal);
      text-decoration: none;
      opacity: .75;
      transition: opacity .2s;
    }

    .forgot:hover { opacity: 1; }
    .forgot:focus-visible { outline: 2px solid var(--teal); outline-offset: 2px; border-radius: 4px; }

    /* primary button */
    .btn-primary {
      display: block;
      width: 100%;
      padding: 14px;
      background: var(--teal);
      color: #000;
      border: none;
      border-radius: 10px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: .3px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform .15s, box-shadow .15s;
      margin-bottom: 22px;
    }

    .btn-primary::after {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.35), transparent);
      transition: left .45s;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(0,255,209,.3);
    }

    .btn-primary:hover::after { left: 100%; }
    .btn-primary:active { transform: translateY(0); box-shadow: none; }
    .btn-primary:focus-visible { outline: 2px solid var(--teal); outline-offset: 2px; }

    /* divider */
    .or {
      text-align: center;
      position: relative;
      margin-bottom: 20px;
    }

    .or::before, .or::after {
      content: '';
      position: absolute;
      top: 50%;
      width: calc(50% - 26px);
      height: 1px;
      background: var(--border);
    }

    .or::before { left: 0; }
    .or::after  { right: 0; }

    .or span {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* social */
    .socials {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 28px;
    }

    .btn-social {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 11px;
      background: var(--field-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: border-color .2s, background .2s;
    }

    .btn-social:hover {
      border-color: rgba(255,255,255,.18);
      background: rgba(255,255,255,.06);
    }

    .btn-social:focus-visible {
      outline: 2px solid var(--teal);
      outline-offset: 2px;
    }

    /* signup CTA */
    .signup-cta {
      text-align: center;
      font-size: 13px;
      color: var(--muted);
    }

    .signup-cta a {
      color: var(--teal);
      font-weight: 700;
      text-decoration: none;
    }

    .signup-cta a:hover { text-decoration: underline; }
    .signup-cta a:focus-visible { outline: 2px solid var(--teal); outline-offset: 2px; border-radius: 4px; }

    /* version badge */
    .ver {
      position: absolute;
      bottom: 28px; right: 48px;
      font-size: 10px;
      color: rgba(255,255,255,.12);
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 600;
    }

    /* ── noise overlay ───────────────────────── */
    .noise {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 999;
      opacity: .028;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 180px;
    }

    /* ── page-load animations ────────────────── */
    @keyframes fadeUp {
      from { opacity:0; transform: translateY(18px); }
      to   { opacity:1; transform: translateY(0); }
    }

    .anim { animation: fadeUp .55s cubic-bezier(.22,.9,.5,1) both; }
    .anim:nth-child(1) { animation-delay:.05s; }
    .anim:nth-child(2) { animation-delay:.12s; }
    .anim:nth-child(3) { animation-delay:.18s; }
    .anim:nth-child(4) { animation-delay:.24s; }
    .anim:nth-child(5) { animation-delay:.30s; }
    .anim:nth-child(6) { animation-delay:.36s; }
    .anim:nth-child(7) { animation-delay:.42s; }
    .anim:nth-child(8) { animation-delay:.48s; }

    /* ── reduced motion ─────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* ── responsive ──────────────────────────── */
    @media (max-width: 820px) {
      html, body { overflow: auto; }
      .shell { flex-direction: column; height: auto; min-height: 100vh; }
      .brand { min-height: 260px; padding: 44px 36px; flex: none; }
      .headline { letter-spacing: -3px; }
      .rail { display: none; }
      .form-panel { width: 100%; padding: 44px 32px 56px; }
    }
  </style>
</head>
<body>

<div class="noise"></div>

<div class="shell">

  <!-- ── Left: brand ── -->
  <div class="brand">

    <!-- pixel particles -->
    <div class="px" style="left:12%;bottom:28%;width:9px;height:9px;background:var(--teal);--d:5.2s;--delay:0s;--op:.45;"></div>
    <div class="px" style="left:22%;bottom:18%;width:6px;height:6px;background:var(--pink);--d:6.8s;--delay:1.3s;--op:.30;"></div>
    <div class="px" style="left:6%;bottom:48%;width:7px;height:7px;background:var(--teal);--d:4.5s;--delay:.6s;--op:.35;"></div>
    <div class="px" style="left:40%;bottom:12%;width:5px;height:5px;background:var(--teal);--d:7s;--delay:2.1s;--op:.25;"></div>
    <div class="px" style="left:55%;bottom:32%;width:11px;height:11px;background:var(--pink);--d:5.8s;--delay:.9s;--op:.20;"></div>
    <div class="px" style="left:33%;bottom:58%;width:4px;height:4px;background:var(--teal);--d:4s;--delay:1.8s;--op:.30;"></div>
    <div class="px" style="left:70%;bottom:24%;width:7px;height:7px;background:var(--teal);--d:6.2s;--delay:3.1s;--op:.20;"></div>
    <div class="px" style="left:18%;bottom:70%;width:5px;height:5px;background:var(--pink);--d:5s;--delay:2.5s;--op:.22;"></div>

    <div class="dots">
      <div class="dot dot-r"></div>
      <div class="dot dot-y"></div>
      <div class="dot dot-g"></div>
    </div>

    <div class="brand-content">
      <div class="wordmark">
        <div class="px-logo">
          <div></div><div></div><div></div><div></div>
          <div></div><div></div><div></div><div></div>
          <div></div><div></div><div></div><div></div>
          <div></div><div></div><div></div><div></div>
        </div>
        <span class="wordmark-name">PIXEL <em>REBELS</em></span>
      </div>

      <h1 class="headline">
        <span class="solid">WELCOME</span>
        <span class="outline" data-text="BACK.">BACK.</span>
      </h1>

      <p class="tagline">Your creative workspace is waiting. Sign in to access your projects, campaigns, and the tools that make the impossible ship.</p>
    </div>
  </div>

  <!-- ── Divider rail ── -->
  <div class="rail"><div class="rail-gem"></div></div>

  <!-- ── Right: form ── -->
  <div class="form-panel">
    <div class="form-inner">

      <div class="anim eyebrow">Member Access</div>
      <h2 class="anim form-title">Sign In</h2>

      <form onsubmit="return false;">

        <div class="anim field">
          <label for="email">Email</label>
          <div class="field-wrap">
            <input type="email" id="email" name="email" placeholder="you@pixelrebels.com" autocomplete="email" spellcheck="false" />
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="4" width="20" height="16" rx="2"/>
              <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
            </svg>
          </div>
        </div>

        <div class="anim field">
          <label for="password">Password</label>
          <div class="field-wrap">
            <input type="password" id="password" name="password" placeholder="••••••••••••" autocomplete="current-password" class="has-eye" />
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <button type="button" class="eye-btn" aria-label="Toggle password visibility" onclick="togglePw()">
              <svg id="eye-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="anim aux-row">
          <label class="check-wrap">
            <input type="checkbox" id="remember" name="remember" />
            <span class="check-label">Remember me</span>
          </label>
          <a href="#" class="forgot">Forgot password?</a>
        </div>

        <button type="submit" class="anim btn-primary">Sign In</button>

      </form>

      <div class="anim or"><span>or continue with</span></div>

      <div class="anim socials">
        <button type="button" class="btn-social">
          <svg width="15" height="15" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Google
        </button>

<script>
  // Password visibility toggle
  function togglePw() {
    const inp = document.getElementById('password');
    const ico = document.getElementById('eye-icon');
    if (inp.type === 'password') {
      inp.type = 'text';
      ico.innerHTML = `
        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
        <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
        <line x1="1" y1="1" x2="23" y2="23"/>`;
    } else {
      inp.type = 'password';
      ico.innerHTML = `
        <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/>
        <circle cx="12" cy="12" r="3"/>`;
    }
  }

  // Icon color on focus
  document.querySelectorAll('.field-wrap input').forEach(inp => {
    inp.addEventListener('focus', () => {
      inp.parentElement.querySelector('svg:not(.eye-btn svg)').style.color = 'var(--teal)';
    });
    inp.addEventListener('blur', () => {
      inp.parentElement.querySelector('svg:not(.eye-btn svg)').style.color = 'var(--muted)';
    });
  });
</script>
